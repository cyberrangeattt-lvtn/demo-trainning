---
# ============================================================
# defaults/main.yml  (role "server")
# GỘP TẤT CẢ biến vào đây để chỉ cần 1 file là role chạy được.
# Ansible tự động nạp file này khi áp role -> KHÔNG được thiếu nó trong repo.
# ============================================================

# ----- SSH -----
ssh_package: openssh-server
ssh_service: ssh

# ----- vsftpd 2.3.4 (bản dính backdoor CVE-2011-2523) -----
# File source phải đặt sẵn trong roles/server/files/ (xem files/README.md)
vsftpd_version: "2.3.4"
vsftpd_src_archive: "vsftpd-2.3.4.tar.gz"
vsftpd_src_dir: "/usr/local/src/vsftpd-2.3.4"
vsftpd_binary: "/usr/sbin/vsftpd"
vsftpd_config: "/etc/vsftpd.conf"

# Gói cần để biên dịch vsftpd từ source
build_packages:
  - build-essential
  - libcap-dev
  - libpam0g-dev
  - libssl-dev

# Yêu cầu runtime của vsftpd
vsftpd_secure_chroot_dir: /usr/share/empty
vsftpd_service_name: vsftpd
vsftpd_systemd_unit: /etc/systemd/system/vsftpd.service

# Tài khoản anonymous cho ftp
ftp_user: ftp
ftp_home: /var/ftp

# Tuỳ chọn ghi vào vsftpd.conf (đổ qua template)
vsftpd_anonymous_enable: "YES"
vsftpd_local_enable: "YES"
vsftpd_write_enable: "NO"

# ----- Flag user -----
# Tạo 1 user thật. Mật khẩu bị hash và lưu vào /etc/shadow.
# Người chơi vào root -> đọc /etc/shadow -> crack hash ra mật khẩu = flag.
flag_username: ctfuser
# !!! ĐỔI thành flag thật (mật khẩu plaintext mà người chơi sẽ crack ra)
flag_password: "CHANGE_ME_FLAG"

# ----- (Tuỳ chọn) File riêng chứa username + hash -----
plant_credentials_file: false
flag_file_path: /root/credentials.txt
flag_hash: "CHANGE_ME_HASH"